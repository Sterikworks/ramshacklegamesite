{{- $support := .Site.Params.support -}}
{{- if and $support $support.patreonUrl $support.modalEnabled -}}
<div class="modal fade" id="supportModal" tabindex="-1" aria-labelledby="supportModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content support-modal">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center px-4 pb-4 pt-0">
        <img
          src="{{ "images/patreon-logo.svg" | absURL }}"
          alt="Patreon"
          class="support-modal__logo mb-3"
          width="72"
          height="72"
        >
        <h2 class="support-modal__title mb-2" id="supportModalLabel">Support Us</h2>
        <p class="support-modal__text mb-4">
          Ramshackle is built by a small indie team. Your support on Patreon helps us keep developing the game.
        </p>
        <a
          href="{{ $support.patreonUrl }}"
          class="btn btn-patreon btn-lg px-4 py-3"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img
            src="{{ "images/patreon-logo.svg" | absURL }}"
            alt=""
            class="support-modal__btn-icon me-2"
            width="24"
            height="24"
            aria-hidden="true"
          >
          Become a Patron
        </a>
        <p class="support-modal__dismiss mt-3 mb-0">
          <button type="button" class="btn btn-link support-modal__later" data-bs-dismiss="modal">
            Maybe later
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var storageKey = "ramshackle-support-dismissed";
    var modalEl = document.getElementById("supportModal");
    if (!modalEl || localStorage.getItem(storageKey)) {
      return;
    }

    var delay = {{ default 2500 $support.modalDelay }};
    var modal = new bootstrap.Modal(modalEl);

    modalEl.addEventListener("hidden.bs.modal", function () {
      localStorage.setItem(storageKey, "1");
    });

    window.setTimeout(function () {
      modal.show();
    }, delay);
  });
</script>
{{- end -}}
