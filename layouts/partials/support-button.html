{{- $support := .Site.Params.support -}}
{{- if and $support $support.patreonUrl $support.enabled -}}
<a
  href="{{ $support.patreonUrl }}"
  class="support-bar"
  target="_blank"
  rel="noopener noreferrer"
>
  <img
    src="{{ "images/patreon-logo.svg" | absURL }}"
    alt=""
    class="support-bar__icon"
    width="22"
    height="22"
    aria-hidden="true"
  >
  Support Us on Patreon
</a>
{{- end -}}
