baseURL = 'https://www.ramshacklegame.com/'
languageCode = 'en-us'
title = 'Ramshackle'
theme = 'hugo-landing-sections'
disableKinds = ['section', 'taxonomy']

[caches]
	[caches.images]
		dir = ':cacheDir/images'

[author]
name = 'Mountainous Development LLC'

[params]
author = 'Mountainous Development LLC'
description = 'Ramshackle is a multiplayer sandbox where players design combat vehicles from destructible parts, armor, and internal systems, then test them against other players or AI.'
favicon = 'logoatlas.ico'

[params.banner]
logo = 'logo.png'
logoSmallDevices = 'logo.png'

[params.menu]
logo = 'logo.png'
logoSmallDevices = 'logo.png'

[params.og]
image = 'hero.png'

[params.repos]
git = 'https://store.steampowered.com/app/3800200/Ramshackle/'

[params.support]
patreonUrl = 'https://www.patreon.com/cw/MountainousDevelopment'
modalEnabled = true
modalDelay = 2500

[params.style]
fontFamily = 'Trebuchet MS, Segoe UI, Arial, sans-serif'
fontSize = '17px'
textColor = '#dbe7f5'
brandColor = '#0b1320'
brandColor2 = '#4fb3ff'
brandColor3 = '#040913'
footerColor = '#8fa5be'